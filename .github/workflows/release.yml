name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    name: Build host (linux/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false
      - name: Build binary
        working-directory: host
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o download-router-host .
      - name: Package tarball
        run: |
          pkg="download-router-host-linux-${{ matrix.goarch }}"
          mkdir "$pkg"
          cp host/download-router-host installers/README.md "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: "*.tar.gz"

  macos:
    name: Build macOS .pkg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false
      - name: Build universal binary
        working-directory: host
        env:
          CGO_ENABLED: "0"
        run: |
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o drh-amd64 .
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o drh-arm64 .
          lipo -create -output download-router-host drh-amd64 drh-arm64
      - name: Build .pkg
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash installers/macos/build-pkg.sh host/download-router-host "$version" "download-router-host-macos.pkg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: "*.pkg"

  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false
      - name: Build binary
        working-directory: host
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o download-router-host.exe .
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        working-directory: installers/windows
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DAppVersion=$version /DBinary="..\..\host\download-router-host.exe" /F"download-router-host-setup-windows-amd64" download-router.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installers/windows/*.exe

  extension:
    name: Build and publish extension
    runs-on: ubuntu-latest
    env:
      HAS_AMO_SECRETS: ${{ secrets.WEB_EXT_API_KEY != '' && secrets.WEB_EXT_API_SECRET != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - working-directory: extension
        run: |
          npm ci
          npm run build
      - name: Package extension
        working-directory: extension
        run: npm run package
      - name: Sign and submit to AMO
        if: env.HAS_AMO_SECRETS == 'true'
        working-directory: extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: npm run sign
      - name: Note about AMO publish
        if: env.HAS_AMO_SECRETS != 'true'
        run: echo "WEB_EXT_API_KEY/WEB_EXT_API_SECRET not set; skipping AMO publish. Attaching the unsigned package only."
      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension/web-ext-artifacts/*

  release:
    name: Publish GitHub release
    needs: [linux, macos, windows, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
